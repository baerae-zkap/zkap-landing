  <!-- Bottom-left arm -->
  <rect x="28" y="38" width="4" height="14" rx="2" fill="white"/>
  <!-- Top-right diagonal -->
  <rect x="28" y="12" width="4" height="16" rx="2" fill="white" transform="rotate(-45,34,20)"/>
  <!-- Bottom-right diagonal -->
  <rect x="28" y="32" width="4" height="16" rx="2" fill="white" transform="rotate(45,34,40)"/>
